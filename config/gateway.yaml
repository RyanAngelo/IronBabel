host: "127.0.0.1"
port: 8080

protocols:
  - name: "http"
    enabled: true
    settings:
      port: 8081
  - name: "grpc"
    enabled: true
    settings:
      port: 8082
  - name: "graphql"
    enabled: true
    settings:
      port: 8083
  - name: "mqtt"
    enabled: true
    settings:
      client_id: "iron-babel-mqtt"

# Middleware — disabled by default; enable and configure as needed.
middleware:
  auth:
    enabled: false
    # api_keys:
    #   - "my-secret-token"
  rate_limit:
    enabled: false
    requests_per_window: 100
    window_secs: 60
  logging:
    enabled: false

# Routes — each route declares its transport with `type:` so every protocol
# owns its own fields and adding a new transport never bloats other routes.
routes:
  - path: "/api/v1"
    methods: ["GET", "POST", "PUT", "DELETE"]
    transport:
      type: http
      url: "http://127.0.0.1:9000"
      timeout_secs: 30

  - path: "/api"
    methods: ["GET", "POST"]
    transport:
      type: http
      url: "http://127.0.0.1:9001"
      timeout_secs: 30

  - path: "/health"
    methods: []
    transport:
      type: http
      url: "http://127.0.0.1:9000"
      timeout_secs: 5

  # ZMQ REQ/REP — gateway sends a frame and waits for the upstream REP reply.
  - path: "/zmq/orders"
    methods: ["POST"]
    transport:
      type: zmq
      address: "127.0.0.1:5555"
      pattern: req_rep
      timeout_secs: 10

  # ZMQ PUSH — gateway fires a frame and returns 202 immediately.
  - path: "/zmq/events"
    methods: ["POST"]
    transport:
      type: zmq
      address: "127.0.0.1:5556"
      pattern: push

  # ZMQ PUB/SUB — gateway publishes with an optional topic prefix.
  # - path: "/zmq/broadcast"
  #   methods: ["POST"]
  #   transport:
  #     type: zmq
  #     address: "127.0.0.1:5558"
  #     pattern: pub_sub
  #     topic: "orders.created"

  # MQTT publish — gateway publishes the HTTP request body to a topic.
  - path: "/mqtt/events"
    methods: ["POST"]
    transport:
      type: mqtt
      broker_url: "mqtt://127.0.0.1:1883"
      topic: "events.http"
      qos: 1
      retain: false
      timeout_secs: 10

# Inbound listeners — background tasks that receive on a non-HTTP transport
# and forward each message as an HTTP POST to `forward_to`.
listeners:
  - type: zmq_pull
    bind: "127.0.0.1:5557"
    forward_to: "http://127.0.0.1:9000/zmq-webhook"
  - type: mqtt_sub
    broker_url: "mqtt://127.0.0.1:1883"
    topics: ["events.device"]
    qos: 1
    forward_to: "http://127.0.0.1:9000/mqtt-webhook"

host: "127.0.0.1"
port: 8080
protocols:
  - name: "http"
    enabled: true
    settings:
      port: 8081
  - name: "grpc"
    enabled: true
    settings:
      port: 8082
  - name: "graphql"
    enabled: true
    settings:
      port: 8083
  - name: "mqtt"
    enabled: true
    settings:
      broker_url: "tcp://localhost:1883"
      client_id: "iron-babel-mqtt"
routes:
  - path: "/api/v1"
    target: "http://127.0.0.1:9000"
    methods: ["GET", "POST", "PUT", "DELETE"]
    timeout_secs: 30
    strip_prefix: false
  - path: "/api"
    target: "http://127.0.0.1:9001"
    methods: ["GET", "POST"]
    timeout_secs: 30
    strip_prefix: false
  - path: "/health"
    target: "http://127.0.0.1:9000"
    methods: []
    timeout_secs: 5
    strip_prefix: false
